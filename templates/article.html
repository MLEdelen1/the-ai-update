<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}}</title>
  <link rel="stylesheet" href="/styles.css?v=14" />
</head>
<body>
  <canvas id="particles"></canvas><div class="top-glow"></div>
  <nav id="nav"><div class="nav-wrap"><a href="/index.html" class="logo-group"><img src="/assets/logo.png" alt="The AI Update" class="logo-img" onerror="this.style.display='none'" /><div class="logo-text">THE AI<span class="logo-accent">UPDATE</span></div></a><div class="nav-links" id="navLinks"><a href="/intel.html">Latest Intel</a><a href="/workflows.html">Workflows</a><a href="/tools.html">Tools</a><a href="/guides/index.html">Guides</a><a href="/articles.html">Articles</a><a href="/resources.html">Resources</a><a href="/starter-kit.html" class="nav-btn">Get Free Kit</a></div><button class="burger" onclick="document.getElementById('navLinks').classList.toggle('show')"><span></span><span></span><span></span></button></div></nav>

  <section class="article-hero" style="padding-top:110px;">
    <div class="contain narrow">
      <p class="tag">{{source}}</p>
      <h1>{{title}}</h1>
      <p class="article-sub">{{description}}</p>
      <p style="margin-top:12px;"><a class="tool-link" href="{{url}}" target="_blank" rel="noopener noreferrer">Verify source &rarr;</a></p>
    </div>
  </section>

  <main class="contain narrow article-content" style="padding-bottom:80px;">
    <img src="{{image_url}}" alt="{{title}}" class="hero-img" style="margin-bottom:28px;"/>
    <article class="article-body">{{content}}</article>
  </main>

  <footer><div class="contain foot-inner"><div class="foot-brand"><img src="/assets/logo.png" alt="" class="foot-logo" onerror="this.style.display='none'" /><span>THE AI UPDATE</span></div><div class="foot-links"><a href="/index.html">Home</a><a href="/intel.html">Latest Intel</a><a href="/workflows.html">Workflows</a><a href="/tools.html">Tools</a><a href="/guides/index.html">Guides</a><a href="/articles.html">Articles</a><a href="/resources.html">Resources</a></div><p class="foot-copy">&copy; 2026 theaiupdate.org &mdash; Practical AI systems for business and everyday users.</p></div></footer>

  <script src="/site.js?v=14"></script>
</body>
</html>
